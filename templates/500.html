{% extends "base.html" %}
{% block title %}Server Error{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 text-center">
        <div class="error-page">
            <h1 class="display-1 text-muted">500</h1>
            <i class="fas fa-exclamation-triangle fa-4x text-warning mb-4"></i>
            <h2 class="mb-3">Internal Server Error</h2>
            <p class="text-muted mb-4">Something went wrong on our end. Please try again later.</p>
            <div class="d-flex justify-content-center gap-3">
                <a href="{{ url_for('index') }}" class="btn btn-primary">
                    <i class="fas fa-home"></i> Go Home
                </a>
                <a href="javascript:location.reload()" class="btn btn-outline-primary">
                    <i class="fas fa-sync-alt"></i> Try Again
                </a>
            </div>
        </div>
    </div>
</div>

<style>
    .error-page {
        padding: 60px 20px;
        animation: fadeIn 0.5s ease-in;
    }
    @keyframes fadeIn {
        from {
            opacity: 0;
            transform: translateY(20px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }
</style>
{% endblock %}
